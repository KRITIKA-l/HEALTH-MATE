<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Health Mate{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background-color: #f8fafc;
    }
    main {
      padding-top: 20px; /* space for fixed navbar */
      min-height: calc(100vh - 200px);
    }
  .sidebar, .profilebar { z-index: 1200 !important; }
  .navbar { z-index: 1300 !important; }
  main, .container-fluid { position: relative; z-index: 1; }
  </style>
</head>
<body>

  {% include 'test1/navbar.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'test1/footer.html' %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
